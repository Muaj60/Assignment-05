<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment-05</title>

    <!-- Tailwind + DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!--Font awesome-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body>

    <header class="bg-base-100 shadow-md px-10 py-4 mb-4 hidden">

        <div class="flex items-center justify-between">



            <h1 class="text-3xl font-bold">All Issues</h1>


            <div class="flex items-center gap-4">

                <label class="input input-bordered flex items-center gap-2 w-64">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" class="grow" placeholder="Search issues..." />
                </label>

                <button class="btn btn-primary">
                    + New Issue
                </button>

            </div>

        </div>
    </header>



    <section id="login-section">

        <div class="hero bg-base-200 min-h-screen">

            <div class="hero-content">

                <div class="card bg-base-100 w-full max-w-xl shadow-2xl">

                    <div class="card-body p-10">

                        <div class="flex flex-col items-center text-center mb-6">
                            <img class="w-20" src="./assets/github-logo.png" alt="">
                            <h1 class="text-2xl font-bold">GitHub Issues Tracker</h1>
                            <p>Sign in to manage your issues</p>
                        </div>

                        <label class="label text-[16px] text-[#1F2937]">Username</label>
                        <input id="username" type="text" class="input  rounded-md" placeholder="Enter Username">

                        <label class="label mt-2 text-[16px] text-[#1F2937]">Password</label>
                        <input id="password" type="password" class="input rounded-md" placeholder="Enter Password">

                        <button id="login-btn" class="btn btn-primary btn-lg mt-4">Sign in</button>

                        <div class="flex flex-col items-center text-center mt-6">
                            <h3 class="font-medium">OR</h3>
                            <span>Demo Credentials:</span>
                            <p>
                                <span class="font-bold">Username:</span>
                                <span class="text-black">admin</span>
                            </p>
                            <p>
                                <span class="font-bold">Password:</span>
                                <span class="text-black">admin123</span>
                            </p>
                        </div>

                    </div>

                </div>

            </div>

        </div>

    </section>

    <!-- Count Section-->
    <section id="count-section" class="w-11/12 mx-auto bg-white rounded-lg p-4 flex justify-between items-center hidden">
        <div class="flex gap-3 items-center">
            <div class="w-10 h-10 bg-purple-100 rounded-full flex items-center justify-center">
                <img class="w-6" src="./assets/Aperture.png" alt="">
            </div>
            <div>
                <h1 id="count" class="text-lg font-bold">0 Issues</h1>
                <p class="text-gray-500 text-sm">Track and manage your project issues</p>
            </div>
        </div>

        <div class="flex gap-4 items-center">
            <!-- Open -->
            <span class="flex items-center gap-1 text-sm text-green-700">
                <span class="w-2.5 h-2.5 bg-green-600 rounded-full block"></span>
                Open
            </span>

            <!-- Closed -->
            <span class="flex items-center gap-1 text-sm text-purple-700">
                <span class="w-2.5 h-2.5 bg-purple-600 rounded-full block"></span>
                Closed
            </span>
        </div>
    </section>



    <section id="all-btn" class="w-11/12 mx-auto bg-[#FFFFFF] hidden">
        <div class="p-5 mb-3 flex gap-5 ">
            <button class="btn btn-natural p-2 rounded-sm w-20 h-8  ">All</button>
            <button class="btn btn-natural p-2 rounded-sm w-20 h-8  ">Open</button>
            <button class="btn btn-natural p-2 rounded-sm w-20 h-8 ">Closed</button>
        </div>
    </section>

    <section id="issue-section" class="hidden w-11/12 mx-auto">
        <div id="issue-container" class="grid grid-cols-4 gap-5">

        </div>
    </section>

    <script src="./JS/script.js"></script>

</body>

</html>
